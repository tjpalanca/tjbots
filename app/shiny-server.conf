run_as shiny; 
python /app/.venv/bin/python3;
reconnect true;

server {
    listen 8080;
    server_name _;

    frame_options deny;
    auth_frame_options deny;
    secure_cookies always;

    location / {

        app_dir /app;
        simple_scheduler 10;

        app_init_timeout 60;
        app_idle_timeout 15;
        app_session_timeout 0;
        http_keepalive_timeout 45;
        sockjs_disconnect_delay 5;

    }
}